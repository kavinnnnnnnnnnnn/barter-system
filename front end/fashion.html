<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Fashion | Barter System</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- GSAP -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

  <style>
    body {
      background: #0f0f0f;
      color: white;
    }
    .card {
      width: 18rem;
      background: #1e1e1e;
      color: white;
      border-radius: 12px;
    }
    .card img {
      height: 160px;
      object-fit: cover;
      border-radius: 10px;
    }
    #bg-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
      overflow: hidden;
    }
    .particle {
      position: absolute;
      font-size: 20px;
      pointer-events: none;
      opacity: 0.7;
    }
  </style>
</head>

<body>

<!-- Background Animation Container -->
<div id="bg-container"></div>

<script>
/* 🔐 LOGIN PROTECTION */
const user = JSON.parse(localStorage.getItem("user"));
if (!user) {
  window.location.href = "login.html";
}
</script>

<div class="container mt-4">

  <h2 class="text-center mb-4">Fashion Offers</h2>

  <!-- 🤖 Chatbot Navigation Indicator -->
  <script>
    const urlParams = new URLSearchParams(window.location.search);
    if (urlParams.get('fromChat') === 'true') {
      const banner = document.createElement('div');
      banner.className = 'alert alert-info alert-dismissible fade show';
      banner.style.background = 'linear-gradient(135deg, rgba(100, 200, 255, 0.2), rgba(30, 144, 255, 0.2))';
      banner.style.border = '2px solid rgba(100, 200, 255, 0.4)';
      banner.style.borderRadius = '10px';
      banner.innerHTML = `
        <strong>🤖 Chatbot Navigation</strong> - Here are all the fashion offers! 
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
      `;
      document.addEventListener('DOMContentLoaded', () => {
        const backBtn = document.querySelector('.btn.btn-warning');
        if (backBtn) {
          backBtn.parentElement.insertBefore(banner, backBtn);
        }
      });
    }
  </script>

  <a href="dashboard.html" class="btn btn-warning mb-3">Back to Dashboard</a>

  <!-- OFFERS -->
  <div id="products" class="d-grid" style="grid-template-columns: repeat(auto-fit, minmax(18rem, 1fr)); gap: 1rem;"></div>

</div>

<script>
const productsDiv = document.getElementById("products");

/* LOAD PRODUCTS */
function loadProducts() {
  fetch("http://localhost:3000/products")
    .then(res => res.json())
    .then(data => {
      const filtered = data.filter(p => p.category === "Fashion");

      productsDiv.innerHTML = '';
      filtered.forEach(p => {
        const card = document.createElement('div');
        card.className = 'card p-2';
        card.innerHTML = `
          <img src="${p.image || 'https://via.placeholder.com/300x200?text=No+Image'}" alt="Product image" onerror="this.src='https://via.placeholder.com/300x200?text=Invalid+Image'">
          <div class="card-body">
            <h5 class="card-title">Offer: ${p.offer}</h5>
            <p class="card-text">Need: ${p.need}</p>
            <small class="text-muted">Category: ${p.category || 'Other'}</small>
            <div class="d-grid gap-2 mt-3">
              <button class="btn btn-success" onclick="exchangeWithUser(${p.user_id}, '${p.user_name || 'User'}', '${p.user_email || 'N/A'}', '${p.offer}', '${p.need}')">
                Exchange
              </button>
            </div>
          </div>
        `;
        productsDiv.appendChild(card);
      });
      gsap.from(productsDiv.children, { scale: 0.5, opacity: 0, stagger: 0.2 });
    })
    .catch(err => console.error('Error loading products:', err));
}

/* 🚀 LOAD ON PAGE START */
loadProducts();

/* 🔄 EXCHANGE FUNCTION */
function exchangeWithUser(userId, userName, userEmail, offer, need) {
  const params = new URLSearchParams({
    toUserId: userId,
    toUserName: userName || 'User #' + userId,
    toUserEmail: userEmail || 'N/A',
    theirOffer: offer,
    theirNeed: need
  });
  window.location.href = `exchange.html?${params.toString()}`;
}
</script>

<script>
document.addEventListener('DOMContentLoaded', () => {
  const bgContainer = document.getElementById('bg-container');
  const ancientSymbols = ['🌿', '🪙', '📜', '🏺', '⚱️', '🌙', '⭐', '🔮', '🗿', '🌌', '🕰️', '📿'];
  for (let i = 0; i < 40; i++) {
    const particle = document.createElement('div');
    particle.className = 'particle';
    particle.textContent = ancientSymbols[Math.floor(Math.random() * ancientSymbols.length)];
    particle.style.left = Math.random() * 100 + '%';
    particle.style.top = Math.random() * 100 + '%';
    particle.style.fontSize = Math.random() * 20 + 15 + 'px';
    particle.style.opacity = Math.random() * 0.5 + 0.3;
    bgContainer.appendChild(particle);
    gsap.to(particle, {
      x: 'random(-300, 300)',
      y: 'random(-300, 300)',
      rotation: 'random(-360, 360)',
      scale: 'random(0.8, 1.2)',
      duration: Math.random() * 15 + 10,
      ease: 'power1.inOut',
      repeat: -1,
      yoyo: true
    });
  }
});
</script>

</body>
</html>
