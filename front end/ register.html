<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Register | Barter System</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #667eea, #764ba2);
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      color: #fff;
    }
    .container {
      background: rgba(255, 255, 255, 0.15);
      padding: 40px;
      border-radius: 16px;
      width: 100%;
      max-width: 400px;
      backdrop-filter: blur(12px);
      text-align: center;
      box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
    }
    h2 {
      margin-bottom: 30px;
      font-size: 1.8rem;
    }
    .form-group {
      margin-bottom: 15px;
      display: none;
    }
    .form-group.active {
      display: block;
    }
    input, button {
      width: 100%;
      padding: 12px;
      margin: 8px 0;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
    }
    input {
      background: rgba(255, 255, 255, 0.2);
      color: white;
      border: 1px solid rgba(255, 255, 255, 0.3);
    }
    input::placeholder {
      color: rgba(255, 255, 255, 0.7);
    }
    button {
      background: #00f2fe;
      color: #000;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.3s ease;
    }
    button:hover {
      background: #00d9ff;
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(0, 242, 254, 0.4);
    }
    button:disabled {
      background: #cccccc;
      cursor: not-allowed;
      transform: none;
    }
    #msg {
      margin-top: 15px;
      min-height: 20px;
      font-size: 0.9rem;
      font-weight: bold;
    }
    .link-text {
      margin-top: 20px;
      font-size: 0.9rem;
    }
    .link-text a {
      color: #00f2fe;
      text-decoration: none;
      font-weight: bold;
    }
    .link-text a:hover {
      text-decoration: underline;
    }
    .step-indicator {
      font-size: 0.8rem;
      color: rgba(255, 255, 255, 0.7);
      margin-bottom: 20px;
    }
    .timer {
      font-size: 0.85rem;
      color: #ff6b6b;
      margin-top: 10px;
    }
  </style>
</head>
<body>

<div class="container">
  <!-- STEP 1: Registration Form -->
  <div id="step1" class="form-group active">
    <h2>📝 Create Account</h2>
    <div class="step-indicator">Step 1 of 2: Enter Details</div>
    <input type="text" id="name" placeholder="Full Name" required>
    <input type="email" id="email" placeholder="Email Address" required>
    <input type="password" id="password" placeholder="Password" required>
    <button onclick="sendOTP()">📧 Send OTP to Email</button>
    <p id="msg"></p>
    <p class="link-text">Already registered? <a href="login.html">Login</a></p>
  </div>

  <!-- STEP 2: OTP Verification -->
  <div id="step2" class="form-group">
    <h2>🔐 Verify Email</h2>
    <div class="step-indicator">Step 2 of 2: Enter OTP</div>
    <p style="margin-bottom: 20px; font-size: 0.95rem;">
      A 6-digit code has been sent to:<br>
      <strong id="displayEmail" style="color: #00f2fe;"></strong>
    </p>
    <input type="text" id="otp" placeholder="Enter 6-digit OTP" maxlength="6" required style="font-size: 1.2rem; letter-spacing: 10px; text-align: center;">
    <button onclick="verifyOTP()">✅ Verify & Create Account</button>
    <button onclick="backToStep1()" style="background: rgba(255, 255, 255, 0.2); margin-top: 10px;">← Back</button>
    <p id="msg2"></p>
    <div class="timer">⏰ OTP expires in <span id="otpTimer">10:00</span></div>
  </div>
</div>

<script>
let otpExpiryTime = null;
let otpTimerInterval = null;

/* 📧 STEP 1: SEND OTP */
function sendOTP() {
  const name = document.getElementById("name").value.trim();
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value.trim();
  const msgDiv = document.getElementById("msg");

  // ✅ Validation
  if (!name) {
    msgDiv.innerText = "❌ Name is required";
    msgDiv.style.color = "#ff6b6b";
    return;
  }

  if (!email || !email.includes("@")) {
    msgDiv.innerText = "❌ Please enter a valid email";
    msgDiv.style.color = "#ff6b6b";
    return;
  }

  if (!password || password.length < 6) {
    msgDiv.innerText = "❌ Password must be at least 6 characters";
    msgDiv.style.color = "#ff6b6b";
    return;
  }

  msgDiv.innerText = "📧 Sending OTP...";
  msgDiv.style.color = "#fff";

  // 📤 Send OTP request
  fetch("http://localhost:3000/send-otp", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ email, name })
  })
  .then(res => res.json())
  .then(data => {
    if (data.success) {
      msgDiv.innerText = "✅ OTP sent! Check your email";
      msgDiv.style.color = "#00ff00";
    
      // Store for step 2
      localStorage.setItem("regEmail", email);
      localStorage.setItem("regPassword", password);
      localStorage.setItem("regName", name);
    
      // Set OTP expiry time (10 minutes)
      otpExpiryTime = Date.now() + 10 * 60 * 1000;
    
      // Switch to step 2
      setTimeout(() => {
        moveToStep2(email);
      }, 1500);
    } else if (data.error) {
      msgDiv.innerText = "❌ " + data.error;
      msgDiv.style.color = "#ff6b6b";
    }
  })
  .catch(err => {
    console.error(err);
    msgDiv.innerText = "❌ Error sending OTP. Please try again.";
    msgDiv.style.color = "#ff6b6b";
  });
}

/* 🔄 MOVE TO STEP 2 */
function moveToStep2(email) {
  document.getElementById("step1").classList.remove("active");
  document.getElementById("step2").classList.add("active");
  document.getElementById("displayEmail").innerText = email;
  document.getElementById("otp").focus();

  // Start OTP timer
  startOTPTimer();
}

/* ⏰ START OTP TIMER */
function startOTPTimer() {
  const timerSpan = document.getElementById("otpTimer");

  if (otpTimerInterval) clearInterval(otpTimerInterval);

  otpTimerInterval = setInterval(() => {
    const remaining = otpExpiryTime - Date.now();

    if (remaining <= 0) {
      clearInterval(otpTimerInterval);
      timerSpan.innerText = "EXPIRED";
      document.getElementById("msg2").innerText = "⏰ OTP has expired. Please try again.";
      document.getElementById("msg2").style.color = "#ff6b6b";
      return;
    }

    const minutes = Math.floor(remaining / 60000);
    const seconds = Math.floor((remaining % 60000) / 1000);
    timerSpan.innerText = `${minutes}:${seconds.toString().padStart(2, '0')}`;
  }, 1000);
}

/* ✅ STEP 2: VERIFY OTP & REGISTER & AUTO-LOGIN */
function verifyOTP() {
  const otp = document.getElementById("otp").value.trim();
  const email = localStorage.getItem("regEmail");
  const password = localStorage.getItem("regPassword");
  const name = localStorage.getItem("regName");
  const msgDiv = document.getElementById("msg2");

  if (!otp || otp.length !== 6) {
    msgDiv.innerText = "❌ Please enter a valid 6-digit OTP";
    msgDiv.style.color = "#ff6b6b";
    return;
  }

  msgDiv.innerText = "🔐 Verifying OTP...";
  msgDiv.style.color = "#fff";

  // 📤 Verify OTP & Register
  fetch("http://localhost:3000/verify-otp-register", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ email, otp, name, password })
  })
  .then(res => res.json())
  .then(data => {
    if (data.success) {
      msgDiv.innerText = "✅ " + data.message;
      msgDiv.style.color = "#00ff00";
      clearInterval(otpTimerInterval);

      // 🎉 AUTO-LOGIN: Save user data to localStorage
      const userData = {
        id: data.user?.id || Math.random().toString(36).substr(2, 9),
        name: name,
        email: email,
        password: password,
        verified: true,
        registeredAt: new Date().toISOString()
      };

      // Save user to localStorage
      localStorage.setItem("user", JSON.stringify(userData));
      console.log("✅ User registered and logged in:", userData);

      // Clear temp registration data
      localStorage.removeItem("regEmail");
      localStorage.removeItem("regPassword");
      localStorage.removeItem("regName");

      // 🚀 DIRECTLY NAVIGATE TO DASHBOARD (after 1.5 seconds for UX)
      setTimeout(() => {
        window.location.href = "dashboard.html";
      }, 1500);
    } else if (data.error) {
      msgDiv.innerText = "❌ " + data.error;
      msgDiv.style.color = "#ff6b6b";
    }
  })
  .catch(err => {
    console.error(err);
    msgDiv.innerText = "❌ Error verifying OTP. Please try again.";
    msgDiv.style.color = "#ff6b6b";
  });
}

/* ← BACK TO STEP 1 */
function backToStep1() {
  document.getElementById("step2").classList.remove("active");
  document.getElementById("step1").classList.add("active");
  document.getElementById("msg").innerText = "";
  document.getElementById("otp").value = "";
  clearInterval(otpTimerInterval);
}
</script>

</body>
</html>
