<!DOCTYPE html>
<html>
<head>

  <meta charset="UTF-8">

  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>Login | Barter System</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-dark text-white d-flex justify-content-center align-items-center" style="height:100vh">

<div class="card p-4 bg-secondary" style="width:350px">
  <h3 class="text-center mb-3">Login</h3>

  <input id="email" class="form-control mb-2" placeholder="Email">
  <input id="password" type="password" class="form-control mb-3" placeholder="Password">

  <button onclick="login()" class="btn btn-warning w-100">Login</button>

  <p id="msg" class="text-center mt-3"></p>
</div>

<script>
function login() {
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value.trim();

  fetch("http://localhost:3000/login", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ email, password })
  })
  .then(res => {
    if (!res.ok) throw new Error("Invalid");
    return res.json();
  })
  .then(user => {
    localStorage.setItem("user", JSON.stringify(user));
    window.location.href = "dashboard.html";
  })
  .catch(() => {
    // Fallback to localStorage if DB login fails
    const users = JSON.parse(localStorage.getItem("users")) || {};
    if (users[email] && users[email] === password) {
      localStorage.setItem("user", JSON.stringify({ id: 1, email }));
      window.location.href = "dashboard.html";
    } else {
      document.getElementById("msg").innerText = "❌ Invalid email or password";
    }
  });
}
</script>

</body>
</html>
