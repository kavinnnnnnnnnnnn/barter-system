<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>User Account | Barter System</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background: #0a0e27; color: #fff; }
    .user-card { background: #1e1e1e; border-radius: 16px; box-shadow: 0 0 24px rgba(100,200,255,0.12); padding: 32px; max-width: 420px; margin: 60px auto; }
    .user-img { width: 120px; height: 120px; border-radius: 50%; object-fit: cover; border: 3px solid #1e90ff; background: #fff; margin-bottom: 18px; }
    .btn-upload { margin-top: 12px; }
  </style>
</head>
<body>
  <div class="container">
    <div class="user-card text-center">
      <img id="userImg" class="user-img" src="" alt="User Image" style="display:none;">
            <div id="imgPlaceholder" style="display:none;position:relative;width:120px;height:120px;margin:0 auto 18px auto;">
              <div id="plusCircle" style="width:100%;height:100%;border-radius:50%;background:#fff;border:3px solid #1e90ff;display:flex;align-items:center;justify-content:center;position:relative;cursor:pointer;">
                <span id="plusIcon" style="font-size:2.5rem;color:#1e90ff;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);">+</span>
              </div>
              <input type="file" id="imgUploadHidden" accept="image/*" style="display:none;">
            </div>
      <div class="mb-3">
        <strong id="userName" style="font-size:1.3rem;">User Name</strong>
      </div>
      <div class="mb-3">
        <span id="userEmail" style="font-size:1.05rem;color:#aaf;">user@email.com</span>
      </div>
      <div class="mb-3" id="uploadSection">
        <input type="file" id="imgUpload" accept="image/*" class="form-control btn-upload">
        <button class="btn btn-info mt-2 w-100" onclick="saveImage()">Update Profile</button>
      </div>
      <a href="dashboard.html" class="btn btn-warning mt-4">Back to Dashboard</a>
    </div>
  </div>
  <script>
    // Load user details
    const user = JSON.parse(localStorage.getItem("user")) || {};
    document.getElementById("userName").textContent = user.name || "User";
    document.getElementById("userEmail").textContent = user.email || "N/A";
    if (user.image) {
      document.getElementById("userImg").src = user.image;
      document.getElementById("userImg").style.display = "block";
      document.getElementById("imgPlaceholder").style.display = "none";
      document.getElementById("uploadSection").style.display = "none";
    } else {
      document.getElementById("userImg").style.display = "none";
      document.getElementById("imgPlaceholder").style.display = "block";
      document.getElementById("uploadSection").style.display = "none";
    }

    // Plus icon/circle click handler
    document.getElementById("plusCircle").addEventListener("click", function() {
      document.getElementById("imgUploadHidden").click();
    });
    document.getElementById("plusIcon").addEventListener("click", function(e) {
      document.getElementById("imgUploadHidden").click();
      e.stopPropagation();
    });
    document.getElementById("imgUploadHidden").addEventListener("change", function() {
      const file = this.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = function(e) {
        user.image = e.target.result;
        localStorage.setItem("user", JSON.stringify(user));
        document.getElementById("userImg").src = user.image;
        document.getElementById("userImg").style.display = "block";
        document.getElementById("imgPlaceholder").style.display = "none";
        alert("Profile image updated!");
      };
      reader.readAsDataURL(file);
    });
    // Save image to localStorage
    function saveImage() {
      const file = document.getElementById("imgUpload").files[0];
      if (!file) { alert("Please select an image."); return; }
      const reader = new FileReader();
      reader.onload = function(e) {
        user.image = e.target.result;
        localStorage.setItem("user", JSON.stringify(user));
        document.getElementById("userImg").src = user.image;
        document.getElementById("userImg").style.display = "block";
        document.getElementById("uploadSection").style.display = "none";
        alert("Image updated!");
      };
      reader.readAsDataURL(file);
    }
  </script>
</body>
</html>
