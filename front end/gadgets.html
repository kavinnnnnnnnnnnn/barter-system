<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Gadgets | Barter System</title>

  <!-- Bootstrap -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />

  <!-- GSAP -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

  <style>
    body {
      background: #0f0f0f;
      color: white;
      min-height: 100vh;
    }

    .card {
      background: #1e1e1e;
      border-radius: 14px;
      color: white;
      border: none;
      transition: transform 0.3s ease;
    }

    .card:hover {
      transform: translateY(-6px) scale(1.02);
    }

    .card img {
      height: 170px;
      object-fit: cover;
      border-radius: 12px;
    }

    #bg-container {
      position: fixed;
      inset: 0;
      z-index: -1;
      overflow: hidden;
    }

    .particle {
      position: absolute;
      font-size: 18px;
      opacity: 0.6;
      pointer-events: none;
    }
  </style>
</head>

<body>

<!-- 🌌 Animated Background -->
<div id="bg-container"></div>

<script>
/* 🔐 LOGIN PROTECTION */
const user = JSON.parse(localStorage.getItem("user"));
if (!user) {
  window.location.href = "login.html";
}
</script>

<div class="container mt-4">

  <h2 class="text-center mb-4">🔌 Gadgets Barter Offers</h2>

  <!-- 🤖 Chatbot Navigation Indicator -->
  <script>
    const urlParams = new URLSearchParams(window.location.search);
    if (urlParams.get('fromChat') === 'true') {
      const banner = document.createElement('div');
      banner.className = 'alert alert-info alert-dismissible fade show';
      banner.style.background = 'linear-gradient(135deg, rgba(100, 200, 255, 0.2), rgba(30, 144, 255, 0.2))';
      banner.style.border = '2px solid rgba(100, 200, 255, 0.4)';
      banner.style.borderRadius = '10px';
      banner.innerHTML = `
        <strong>🤖 Chatbot Navigation</strong> - Here are all the gadget offers! 
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
      `;
      document.addEventListener('DOMContentLoaded', () => {
        const container = document.querySelector('.container');
        container.insertBefore(banner, container.firstChild.nextSibling.nextSibling);
      });
    }
  </script>

  <div class="text-center mb-3">
    <a href="dashboard.html" class="btn btn-warning">⬅ Back to Dashboard</a>
  </div>

  <!-- OFFERS GRID -->
  <div
    id="products"
    class="row g-4 justify-content-center"
  ></div>

</div>

<script>
/* 📦 LOAD GADGETS OFFERS */
fetch("http://localhost:3000/products")
  .then(res => res.json())
  .then(data => {
    console.log("DATA FROM API:", data);

    const productsDiv = document.getElementById("products");
    productsDiv.innerHTML = "";

    const filtered = data.filter(
      p =>
        p.category &&
        p.category.toLowerCase().trim() === "gadgets"
    );

    console.log("FILTERED:", filtered);

    if (filtered.length === 0) {
      productsDiv.innerHTML = `
        <p class="text-center text-muted">
          No gadget-related offers available yet.
        </p>`;
      return;
    }

    filtered.forEach(p => {
      const col = document.createElement("div");
      col.className = "col-md-4 col-lg-3";

      col.innerHTML = `
        <div class="card p-2 h-100">
          <img
            src="${p.image || "https://via.placeholder.com/300x200?text=No+Image"}"
            onerror="this.src='https://via.placeholder.com/300x200?text=Invalid+Image'"
          />
          <div class="card-body">
            <h5 class="card-title">Offer: ${p.offer}</h5>
            <p class="card-text">Need: ${p.need}</p>
            <span class="badge bg-info text-dark">${p.category}</span>
            <div class="d-grid gap-2 mt-3">
              <button class="btn btn-success" onclick="exchangeWithUser(${p.user_id}, '${p.user_name || 'User'}', '${p.user_email || 'N/A'}', '${p.offer}', '${p.need}')">
                Exchange
              </button>
            </div>
          </div>
        </div>
      `;

      productsDiv.appendChild(col);
    });

    /* ✨ GSAP Card Animation */
    gsap.from(".card", {
      scale: 0.7,
      opacity: 0,
      duration: 0.8,
      stagger: 0.15,
      ease: "power3.out"
    });
  })
  .catch(err => {
    console.error("FETCH ERROR:", err);
    document.getElementById("products").innerHTML =
      "<p class='text-danger text-center'>Failed to load offers</p>";
  });
</script>

<script>
/* 🌌 BACKGROUND ANIMATION */
document.addEventListener("DOMContentLoaded", () => {
  const bg = document.getElementById("bg-container");
  const symbols = ["🔌","📱","⌚","💻","📷","🎧","⚡"];

  for (let i = 0; i < 35; i++) {
    const p = document.createElement("div");
    p.className = "particle";
    p.textContent = symbols[Math.floor(Math.random() * symbols.length)];
    p.style.left = Math.random() * 100 + "%";
    p.style.top = Math.random() * 100 + "%";
    bg.appendChild(p);

    gsap.to(p, {
      x: "random(-300,300)",
      y: "random(-300,300)",
      rotation: "random(-360,360)",
      duration: Math.random() * 12 + 8,
      repeat: -1,
      yoyo: true,
      ease: "sine.inOut"
    });
  }
});

/* 🔄 EXCHANGE FUNCTION */
function exchangeWithUser(userId, userName, userEmail, offer, need) {
  const params = new URLSearchParams({
    toUserId: userId,
    toUserName: userName || 'User #' + userId,
    toUserEmail: userEmail || 'N/A',
    theirOffer: offer,
    theirNeed: need
  });
  window.location.href = `exchange.html?${params.toString()}`;
}
</script>

</body>
</html>
