<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Barter System</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
</head>

<body class="text-center" style="min-height:100vh;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;background:linear-gradient(135deg,#ffb347,#ffcc33 60%,#4b79a1 100%);">
  <!-- Animated trade theme background -->
  <div id="trade-bg">
    <div class="circle" style="--i:1"></div>
    <div class="circle" style="--i:2"></div>
    <div class="circle" style="--i:3"></div>
    <div class="circle" style="--i:4"></div>
    <div class="circle" style="--i:5"></div>
    <div class="circle" style="--i:6"></div>
  </div>
  <div class="card shadow-lg p-4 border-0" style="background:rgba(255,255,255,0.92);max-width:420px;width:100%;z-index:2;">
    <div class="mb-4">
      <!-- New Trade SVG Icon: Two arrows crossing, symbolizing exchange -->
      <svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect width="64" height="64" rx="32" fill="#4b79a1"/>
        <g>
          <path d="M18 32h28" stroke="#ffb347" stroke-width="4" stroke-linecap="round"/>
          <polygon points="40,28 46,32 40,36" fill="#ffb347"/>
          <path d="M46 32H18" stroke="#ffcc33" stroke-width="4" stroke-linecap="round"/>
          <polygon points="24,36 18,32 24,28" fill="#ffcc33"/>
        </g>
        <circle cx="32" cy="32" r="28" fill="none" stroke="#fff" stroke-width="2"/>
      </svg>
    </div>
    <h1 id="title" class="display-5 fw-bold mb-3" style="color:#ffb347;">Barter System</h1>
    <p class="lead mb-4" style="color:#4b79a1;">Exchange goods & services without money</p>
    <div class="d-grid gap-2">
      <a href="login.html" id="loginBtn" class="btn btn-warning btn-lg fw-semibold shadow-sm" style="background:#ffb347;border:none;color:#4b79a1;">Login</a>
      <a href="register.html" class="btn btn-outline-primary btn-lg fw-semibold shadow-sm" style="border-color:#4b79a1;color:#4b79a1;">Register</a>
    </div>
    <hr class="my-4" style="border-color:#ffb347;opacity:0.5;">
    <small style="color:#4b79a1;">Empowering communities through smart exchange</small>
  </div>
  <style>
    #trade-bg {
      position:absolute;top:0;left:0;width:100vw;height:100vh;z-index:1;pointer-events:none;
    }
    .circle {
      position:absolute;
      width:120px;height:120px;
      border-radius:50%;
      background:linear-gradient(135deg,#ffb347 60%,#4b79a1 100%);
      opacity:0.18;
      filter:blur(2px);
      animation: float 8s infinite ease-in-out;
    }
    .circle[style*="--i:1"] {top:10%;left:15%;animation-delay:0s;}
    .circle[style*="--i:2"] {top:60%;left:10%;animation-delay:1s;}
    .circle[style*="--i:3"] {top:30%;left:70%;animation-delay:2s;}
    .circle[style*="--i:4"] {top:80%;left:80%;animation-delay:3s;}
    .circle[style*="--i:5"] {top:50%;left:50%;animation-delay:4s;}
    .circle[style*="--i:6"] {top:20%;left:80%;animation-delay:5s;}
    @keyframes float {
      0% {transform:translateY(0px) scale(1);}
      50% {transform:translateY(-40px) scale(1.1);}
      100% {transform:translateY(0px) scale(1);}
    }
  </style>
  <script>
    gsap.from("#title",{y:-100,opacity:0,duration:1});
    gsap.from(".card",{scale:0.8,opacity:0,duration:1,delay:0.2});
    gsap.from(".btn",{y:50,opacity:0,stagger:0.15,duration:0.7,delay:0.5});
    // Animate circles
    gsap.to(".circle",{y:30,repeat:-1,yoyo:true,duration:4,ease:"power1.inOut",stagger:{amount:2}});
    // Animate login button with pulse effect
    gsap.to("#loginBtn",{scale:1.08,repeat:-1,yoyo:true,duration:0.7,ease:"power1.inOut",delay:1});
  </script>
</body>
</html>
