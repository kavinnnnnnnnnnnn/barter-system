<!DOCTYPE html>
<html>
<head>
  <title>Barter System</title>
  <style>
    body{
      margin:0; font-family:Segoe UI;
      background:linear-gradient(120deg,#1e3c72,#2a5298);
      color:white; text-align:center;
    }
    .logout{position:absolute; top:15px; right:20px; padding:8px 14px;}
    form{
      background:rgba(255,255,255,.15);
      padding:20px; border-radius:14px;
      width:320px; margin:20px auto;
    }
    input,button{
      width:100%; padding:10px; margin:6px 0;
      border:none; border-radius:6px;
    }
    button{background:#00f2fe; font-weight:bold;}
    .cards{
      display:flex; flex-wrap:wrap; justify-content:center;
    }
    .card{
      background:rgba(0,0,0,.45);
      width:260px; margin:15px; padding:15px;
      border-radius:14px;
    }
    .card img{
      width:100%; height:150px;
      object-fit:cover; border-radius:10px;
    }
  </style>
</head>

<body onload="checkLogin(); loadOffers();">

<button class="logout" onclick="logout()">Logout</button>

<h1>Barter System</h1>

<form id="barterForm">
  <input id="offer" placeholder="What you offer" required>
  <input id="need" placeholder="What you need" required>
  <input id="image" placeholder="Paste DIRECT image URL">
  <button>Post Offer</button>
</form>

<h2>Available Offers</h2>
<div class="cards" id="barterCards"></div>

<script src="script.js"></script>
</body>
</html>
